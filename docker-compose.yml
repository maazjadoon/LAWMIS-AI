version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: lawmis_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lawmis
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lawmis_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DB_URL=postgresql://postgres:password@db:5432/lawmis
      - SHEETS_ID=${SHEETS_ID}
      - SHEETS_TAB=${SHEETS_TAB}
      - INTERFACE=api
      - ALLOWED_ORIGINS=*
    depends_on:
      - db
    volumes:
      - ./exports:/app/exports

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lawmis_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
